deploymentMode: SingleBinary

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  limits_config:
    allow_structured_metadata: true
    max_structured_metadata_entries_count: 300
    volume_enabled: true
  pattern_ingester:
    enabled: true
  ruler:
    enable_api: true
  schemaConfig:
    configs:
      - from: "2024-04-01"
        index:
          period: 24h
          prefix: loki_index_
        object_store: s3
        schema: v13
        store: tsdb

singleBinary:
  replicas: 1
  resources:
    requests:
      cpu: 250m
      memory: 2Gi
    limits:
      memory: 3Gi

minio:
  enabled: true
  postJob:
    enabled: false
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi

gateway:
  nginxConfig:
    resolver: 10.233.0.3

# Disable all other deployment modes
backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0
distributor:
  replicas: 0
ingester:
  replicas: 0
querier:
  replicas: 0
queryFrontend:
  replicas: 0
queryScheduler:
  replicas: 0
indexGateway:
  replicas: 0
compactor:
  replicas: 0
bloomCompactor:
  replicas: 0
bloomGateway:
  replicas: 0

chunksCache:
  enabled: false
resultsCache:
  enabled: false
