apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://argoproj.github.io/argo-helm
      chart: argo-cd
      targetRevision: 9.5.4
      helm:
        valueFiles:
          - $values/kubernetes/system/argocd/values.yaml
    - repoURL: https://github.com/hunsy9/homelab-platform.git
      targetRevision: main
      ref: values
    - repoURL: https://github.com/hunsy9/homelab-platform.git
      targetRevision: main
      path: kubernetes/system/argocd/manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
