apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik-manifests
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/hunsy9/homelab-platform.git
    targetRevision: main
    path: kubernetes/system/traefik/manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
