apiVersion: argoproj.io/v1alpha1                                                                                                                            
kind: Application                                                                                                                                           
metadata:                                                                                                                                                   
  name: prometheus-stack-secrets                                                                                                                            
  namespace: argocd                                                                                                                                         
spec:  
  project: default                                                                                                                                          
  source:                                          
    repoURL: https://github.com/hunsy9/homelab-platform.git                                                                                                 
    targetRevision: main                                                                                                                                    
    path: kubernetes/system/monitoring/prometheus-stack/secrets                                                                                             
    plugin:                                                                                                                                                 
      name: ksops                                                                                                                                           
  destination:                                                                                                                                              
    server: https://kubernetes.default.svc                                                                                                                  
    namespace: default                                                                                                                                      
  syncPolicy:                                      
    automated:                                                                                                                                              
      prune: true                                                                                                                                           
      selfHeal: true